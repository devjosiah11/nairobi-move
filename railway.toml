# NairobiMove - Railway Root Config
# NOTE: Build/Start commands must be set MANUALLY per service in Railway dashboard
# because Railway reads THIS file (repo root), not the per-app railway.toml files.
#
# Per-service commands:
#   matatu-pulse:    build = "npm install --include=dev && npm run build -w matatu-pulse"   start = "npm start -w matatu-pulse"
#   sacco-dashboard: build = "npm install --include=dev && npm run build -w sacco-dashboard" start = "npm start -w sacco-dashboard"
#   boda-dispatch:   build = "npm install --include=dev && npm run build -w boda-dispatch"   start = "npm start -w boda-dispatch"
#   registration:    build = "npm install --include=dev && npm run build -w registration"     start = "npm start -w registration"

[build]
builder = "nixpacks"

[deploy]
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
